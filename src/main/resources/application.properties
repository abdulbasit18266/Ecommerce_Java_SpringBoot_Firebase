# Server Configuration
server.port=8080
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=JSESSIONID

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Firebase Configuration (Ensure your JSON file is in the root or resources)
# Replace with your actual JSON file name if different
firebase.config.path=serviceAccountKey.json

# File Upload Limit (for product images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging for Debugging
logging.level.org.springframework.web=INFO
logging.level.com.mobilestore.Abdulbasit=DEBUG
