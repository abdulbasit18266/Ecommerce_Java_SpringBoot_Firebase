<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card p-4 shadow border-0" style="border-radius: 15px;">
            <h3 class="text-center mb-4">Verify OTP</h3>
            <p class="text-muted small">We've sent a code to your email.</p>
            <form th:action="@{/verify-otp}" method="post">
                <div th:if="${error}" class="alert alert-danger p-2 small" th:text="${error}"></div>
                <input type="text" name="otp" class="form-control mb-3 text-center fs-4" maxlength="6" placeholder="_ _ _ _ _ _" required>
                <button class="btn btn-success w-100">Verify OTP</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
