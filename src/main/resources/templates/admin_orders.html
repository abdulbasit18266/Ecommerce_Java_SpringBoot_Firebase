<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-select { border-radius: 5px; padding: 5px; border: 1px solid #ccc; background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h3 class="fw-bold">Customer Orders 📦</h3>
        <a href="/admin/dashboard" class="btn btn-dark">Back to Dashboard</a>
    </div>
    <div class="card shadow border-0 p-3">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Order ID</th><th>Customer</th><th>Product</th><th>Amount</th><th>Update Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="${o.id}"></td>
                <td th:text="${o.customerName}"></td>
                <td th:text="${o.name}"></td>
                <td class="fw-bold text-success" th:text="'₹' + ${o.totalAmount}"></td>
                <td>
                    <select class="status-select"
                            th:data-id="${o.id}"
                            onchange="sendUpdate(this)">
                        <option value="Pending" th:selected="${o.status == 'Pending'}">Pending 🟡</option>
                        <option value="Shipping" th:selected="${o.status == 'Shipping'}">Shipping 🔵</option>
                        <option value="Delivered" th:selected="${o.status == 'Delivered'}">Delivered 🟢</option>
                        <option value="Canceled" th:selected="${o.status == 'Canceled'}">Canceled 🔴</option>
                    </select>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function sendUpdate(element) {
        const orderId = element.getAttribute('data-id');
        const newStatus = element.value;

        const formData = new URLSearchParams();
        formData.append('orderId', orderId);
        formData.append('status', newStatus);

        fetch('/admin/update-order-status', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData
        })
        .then(response => response.text())
        .then(data => {
            if(data === "Success") {
                alert("Status Updated Successfully! ✅");
            } else {
                alert("Update Failed: " + data);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Connection Error! ❌");
        });
    }
</script>
</body>
</html>
