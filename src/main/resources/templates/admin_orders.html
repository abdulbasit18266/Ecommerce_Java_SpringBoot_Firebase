<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Orders - Mobile Store Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Consistent Global Theme */
        body {
            background: #F9F9F7;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1A1A1A;
            min-height: 100vh;
        }

        .container { padding-top: 50px; padding-bottom: 80px; }

        /* Typography */
        .page-title { font-weight: 800; font-size: 2.2rem; letter-spacing: -1.5px; }

        /* Premium Card Container */
        .orders-card {
            background: white;
            border-radius: 35px;
            border: none;
            padding: 35px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.03);
            border: 1px solid #F0F0EB;
        }

        /* Table Styling */
        .table thead th {
            background: transparent;
            border: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            padding: 20px 15px;
            color: #A89880; /* Muted Gold */
        }
        .table tbody td {
            padding: 22px 15px;
            border-bottom: 1px solid #F5F5F0;
            vertical-align: middle;
            font-size: 0.95rem;
        }

        /* Custom Status Select */
        .status-select-premium {
            border: 1.5px solid #EAEAEA;
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 0.85rem;
            font-weight: 600;
            background-color: #FDFDFB;
            color: #1A1A1A;
            transition: 0.3s;
            cursor: pointer;
            width: 100%;
            max-width: 160px;
        }
        .status-select-premium:focus {
            outline: none;
            border-color: #A89880;
            box-shadow: 0 0 0 4px rgba(168, 152, 128, 0.1);
        }

        /* Badge for Price */
        .price-text { font-weight: 800; color: #1A1A1A; }

        /* Buttons */
        .btn-premium-outline {
            border: 1.5px solid #1A1A1A;
            color: #1A1A1A;
            border-radius: 14px;
            padding: 10px 25px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .btn-premium-outline:hover { background: #1A1A1A; color: #fff; }

        .customer-name { font-weight: 700; display: block; }
        .customer-phone { font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-end mb-5">
        <div>
            <h2 class="page-title">Order Management.</h2>
            <p class="text-muted mb-0">Oversee customer requests and fulfillments.</p>
        </div>
        <a href="/admin/dashboard" class="btn-premium-outline">
            <i class="bi bi-grid-1x2 me-2"></i>Dashboard
        </a>
    </div>

    <div class="orders-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Ref ID</th>
                    <th>Customer Details</th>
                    <th>Device</th>
                    <th>Investment</th>
                    <th class="text-center">Current Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="o : ${orders}">
                    <td class="text-muted fw-bold small" th:text="'#ORD-' + ${o.id}"></td>

                    <td>
                        <span class="customer-name" th:text="${o.customerName}">Name</span>
                        <span class="customer-phone" th:text="${o.phoneNumber}">Phone</span>
                    </td>

                    <td class="fw-bold" th:text="${o.name}">Product Name</td>

                    <td class="price-text" th:text="'₹' + ${o.totalAmount}"></td>

                    <td class="text-center">
                        <select class="status-select-premium"
                                th:data-id="${o.id}"
                                onchange="sendUpdate(this)">
                            <option value="Pending" th:selected="${o.status == 'Pending'}">Pending</option>
                            <option value="Shipping" th:selected="${o.status == 'Shipping'}">Shipping</option>
                            <option value="Delivered" th:selected="${o.status == 'Delivered'}">Delivered</option>
                            <option value="Canceled" th:selected="${o.status == 'Canceled'}">Canceled</option>
                        </select>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function sendUpdate(element) {
        const orderId = element.getAttribute('data-id');
        const newStatus = element.value;

        const formData = new URLSearchParams();
        formData.append('orderId', orderId);
        formData.append('status', newStatus);

        fetch('/admin/update-order-status', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData
        })
        .then(response => response.text())
        .then(data => {
            if(data === "Success") {
                // Aesthetic toast notifications could be added here later
                alert("Status Updated Successfully! ✅");
            } else {
                alert("Update Failed: " + data);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Connection Error! ❌");
        });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
