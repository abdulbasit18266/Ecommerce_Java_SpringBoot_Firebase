<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders | Mobile Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow p-4" style="border-radius: 15px;">
        <h2 class="mb-4">Your Orders 📦</h2>
        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th>Order ID</th>
                <th>Total Amount</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="'#' + ${o.id}"></td>
                <td class="fw-bold text-success" th:text="'₹' + ${o.totalAmount}"></td>
                <td>
                    <span class="badge bg-info text-dark" th:text="${o.status}"></span>
                </td>
            </tr>
            </tbody>
        </table>
        <a href="/" class="btn btn-outline-primary mt-3">Back to Home</a>
    </div>
</div>
</body>
</html>
