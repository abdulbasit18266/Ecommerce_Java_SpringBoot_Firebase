<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${product.name} + ' | Mobile Store'">Product Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { background: #f8f9fa; font-family: 'Poppins', sans-serif; color: #333; }
        .details-container { margin-top: 40px; margin-bottom: 60px; }
        .product-card { border: none; border-radius: 30px; background: #ffffff; box-shadow: 0 20px 40px rgba(0,0,0,0.05); padding: 40px; }
        .img-section { background: #ffffff; display: flex; align-items: center; justify-content: center; }
        .product-img { max-height: 500px; width: auto; max-width: 100%; object-fit: contain; transition: 0.5s ease; }
        .product-img:hover { transform: scale(1.03); }
        .brand-badge { display: inline-block; background: #f0f0f0; color: #888; padding: 5px 15px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; }
        .product-title { font-weight: 700; font-size: 2.8rem; color: #000; margin-bottom: 5px; }
        .price-tag { font-size: 2.2rem; font-weight: 700; color: #000; margin: 15px 0; }

        /* ✨ NEW SPECS STYLE */
        .specs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 25px 0; }
        .spec-item { background: #fdfdfd; border: 1px solid #eee; padding: 12px; border-radius: 12px; }
        .spec-label { font-size: 0.75rem; color: #999; text-transform: uppercase; font-weight: 600; display: block; }
        .spec-value { font-size: 1rem; color: #222; font-weight: 600; }

        .full-specs-box { background: #f9f9f9; padding: 20px; border-radius: 15px; border-left: 5px solid #000; margin-top: 20px; }
        .btn-add-cart { background: #000; color: white; border-radius: 15px; padding: 18px; font-weight: 700; transition: 0.3s; text-decoration: none; display: block; text-align: center; font-size: 1.1rem; }
        .btn-add-cart:hover { background: #333; color: white; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .stock-status { color: #28a745; font-size: 0.95rem; font-weight: 600; }
    </style>
</head>

<body>

<div class="container details-container">
    <div class="product-card">
        <div class="row">

            <div class="col-md-6 img-section">
                <img th:src="${product.image}" class="product-img" alt="Mobile Image">
            </div>

            <div class="col-md-6 ps-md-5 mt-4 mt-md-0">
                <span class="brand-badge" th:text="${product.brand}">Brand</span>
                <h1 class="product-title" th:text="${product.name}">Product Name</h1>

                <div class="d-flex align-items-center gap-3">
                    <p class="stock-status mb-0">● In Stock</p>
                    <span class="badge bg-warning text-dark" th:if="${product.rating > 0}">
                        <span th:text="${product.rating}">0.0</span> ⭐
                    </span>
                </div>

                <p class="price-tag">₹ <span th:text="${product.price}">0.0</span></p>

                <div class="specs-grid">
                    <div class="spec-item">
                        <span class="spec-label">Processor</span>
                        <span class="spec-value" th:text="${product.processor != null ? product.processor : 'N/A'}">Processor</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">RAM</span>
                        <span class="spec-value" th:text="${product.ram != null ? product.ram : 'N/A'}">RAM</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Storage</span>
                        <span class="spec-value" th:text="${product.storage != null ? product.storage : 'N/A'}">Storage</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Display</span>
                        <span class="spec-value">Super Retina</span>
                    </div>
                </div>

                <div class="description-box mb-4">
                    <h6 class="fw-bold text-dark">About this item:</h6>
                    <p th:text="${product.description}" class="text-muted">Description...</p>
                </div>

                <div class="full-specs-box" th:if="${product.fullSpecs != null}">
                    <h6 class="fw-bold">Full Technical Details:</h6>
                    <p class="small mb-0" th:text="${product.fullSpecs}"></p>
                </div>

                <div class="mt-4">
                    <a th:href="@{'/add-to-cart/' + ${product.id}}" class="btn-add-cart">
                        🛒 Add to Cart
                    </a>
                </div>

                <a href="/" class="btn-back text-decoration-none text-muted d-inline-block mt-3">
                    ← Back to Store
                </a>


            </div>

        </div>
    </div>
</div>

<footer class="text-center py-4">
    <p class="text-muted small">&copy; 2026 Mobile Store. Crafted for Abdul Basit.</p>
</footer>

</body>
</html>
