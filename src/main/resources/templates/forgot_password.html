<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card p-4 shadow border-0" style="border-radius: 15px;">
            <h3 class="text-center mb-4">Reset Password</h3>
            <p class="text-muted small">Enter your email to receive a 6-digit OTP.</p>
            <form th:action="@{/forgot-password}" method="post">
                <div th:if="${error}" class="alert alert-danger p-2 small" th:text="${error}"></div>
                <input type="email" name="email" class="form-control mb-3" placeholder="Enter Email" required>
                <button class="btn btn-primary w-100">Send OTP</button>
            </form>
            <div class="text-center mt-3"><a href="/login" class="small">Back to Login</a></div>
        </div>
    </div>
</div>
</body>
</html>
