<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Product | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="card shadow border-0 p-4">
        <h2 class="fw-bold text-primary mb-4">Add New Mobile Device 📱</h2>

        <form th:action="@{/admin/save-product}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. iPhone 15 Pro" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Brand</label>
                    <input type="text" name="brand" class="form-control" placeholder="e.g. Apple" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Price (₹)</label>
                    <input type="number" step="0.01" name="price" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Image URL</label>
                    <input type="text" name="image" class="form-control" placeholder="https://..." required>
                </div>

                <div class="col-md-3">
                    <label class="form-label">RAM</label>
                    <input type="text" name="ram" class="form-control" placeholder="e.g. 8GB">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Storage</label>
                    <input type="text" name="storage" class="form-control" placeholder="e.g. 128GB">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Processor</label>
                    <input type="text" name="processor" class="form-control" placeholder="e.g. A17 Pro">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Rating</label>
                    <input type="number" step="0.1" name="rating" class="form-control" placeholder="1 to 5">
                </div>

                <div class="col-12">
                    <label class="form-label">Short Description</label>
                    <textarea name="description" class="form-control" rows="2"></textarea>
                </div>

                <div class="col-12">
                    <label class="form-label">Full Technical Specifications (Real Website Look)</label>
                    <textarea name="fullSpecs" class="form-control" rows="4" placeholder="Mention battery, display, and camera details here..."></textarea>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary px-5">Save Product</button>
                    <a href="/admin/dashboard" class="btn btn-outline-secondary px-5">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
</html>
