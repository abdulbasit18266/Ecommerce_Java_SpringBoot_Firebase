<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>New Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4 card p-4 shadow border-0" style="border-radius: 15px;">
      <h3 class="text-center mb-4">New Password</h3>
      <form th:action="@{/reset-password}" method="post">
        <input type="password" name="password" class="form-control mb-3" placeholder="Enter New Password" minlength="4" required>
        <button class="btn btn-dark w-100">Update Password</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
