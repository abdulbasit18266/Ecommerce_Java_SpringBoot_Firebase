<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Success | Mobile Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .success-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        .checkmark { font-size: 80px; color: #28a745; }
    </style>
</head>
<body>
<div class="success-card">
    <div class="checkmark">✅</div>
    <h1 class="fw-bold">Order Placed Successfully!</h1>
    <p class="text-muted">Thank you for shopping with **Mobile Store**.<br>Your order is being processed.</p>
    <br>
    <a href="/" class="btn btn-dark px-5 py-2 rounded-pill">Continue Shopping</a>
    <br><br>
    <a href="/my-orders" class="text-decoration-none text-primary fw-bold">View My Orders</a>
</div>
</body>
</html>
