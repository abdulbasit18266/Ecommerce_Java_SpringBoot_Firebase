<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Account - Mobile Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@24.5.0/build/css/intlTelInput.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Home & Login wala Gradient Background */
        body {
            background: linear-gradient(135deg, #E5E5DE 0%, #F5F5F0 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: #1A1A1A;
            padding: 40px 0;
        }

        /* Premium Registration Card */
        .reg-card {
            width: 100%;
            max-width: 500px;
            padding: 50px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.07);
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin: auto;
        }

        .brand-logo {
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 25px;
            display: block;
            text-align: center;
            color: #1A1A1A;
            text-decoration: none;
        }

        .reg-title {
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
        }

        /* Form Labels & Inputs */
        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #A89880; /* Muted Gold/Tan */
            margin-bottom: 8px;
        }

        .form-control-premium {
            background: #F9F9F7 !important;
            border: 1px solid #EAEAEA !important;
            padding: 14px 20px;
            border-radius: 15px;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .form-control-premium:focus {
            box-shadow: 0 0 0 4px rgba(168, 152, 128, 0.1);
            border-color: #A89880 !important;
            outline: none;
        }

        /* Fix for intl-tel-input width */
        .iti { width: 100%; display: block; }
        .iti__hide { display: none; }

        /* Button Styling */
        .btn-premium-dark {
            background: #1A1A1A;
            color: #fff;
            border-radius: 15px;
            padding: 16px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-premium-dark:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            color: #fff;
        }

        .link-premium {
            color: #1A1A1A;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .link-premium:hover {
            color: #A89880;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="reg-card">
        <a href="/" class="brand-logo">
            <i class="bi bi-phone-vibrate me-2"></i>MOBILE STORE
        </a>

        <h2 class="reg-title text-center">Join Us.</h2>
        <p class="text-muted text-center mb-4 small">Experience innovation with every device.</p>

        <form th:action="@{/register}" method="post" id="registerForm">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control form-control-premium" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control form-control-premium" placeholder="example@mail.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" id="phoneInput" class="form-control form-control-premium" required>
                <input type="hidden" name="phoneNumber" id="fullPhoneNumber">
            </div>

            <div class="mb-4">
                <label class="form-label">Secure Password</label>
                <input type="password" name="password" class="form-control form-control-premium" placeholder="Choose a password" required>
            </div>

            <button type="submit" class="btn btn-premium-dark w-100">Create Account</button>
        </form>

        <p class="text-center mt-4 small text-muted">Already a member?
            <a href="/login" class="link-premium">Login here</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@24.5.0/build/js/intlTelInput.min.js"></script>
<script>
    const input = document.querySelector("#phoneInput");
    const fullNumberInput = document.querySelector("#fullPhoneNumber");

    const iti = window.intlTelInput(input, {
        initialCountry: "in",
        separateDialCode: true,
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@24.5.0/build/js/utils.js",
    });

    document.querySelector("#registerForm").addEventListener("submit", function() {
        fullNumberInput.value = iti.getNumber();
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
