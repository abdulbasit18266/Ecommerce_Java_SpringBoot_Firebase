<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Bag | Mobile Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-dark: #1a1a1a; --accent-color: #007aff; }
        body { background-color: #f5f5f7; font-family: 'Inter', sans-serif; color: #1d1d1f; }
        .navbar { background: rgba(255, 255, 255, 0.8) !important; backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .cart-container { max-width: 1000px; margin-top: 50px; }
        .cart-card { background: #fff; border-radius: 18px; padding: 24px; margin-bottom: 16px; display: flex; align-items: center; border: none; }
        .product-img { width: 100px; height: 100px; object-fit: contain; background: #fbfbfb; border-radius: 12px; padding: 5px; }
        .summary-card { background: #fff; border-radius: 22px; padding: 30px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .btn-checkout { background: var(--primary-dark); color: white; border-radius: 12px; padding: 14px; width: 100%; font-weight: 600; text-decoration: none; display: block; text-align: center; border: none; }
        .btn-checkout:hover { background: #333; color: white; }
        .remove-btn { color: #ff3b30; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">📱 MOBILE STORE</a>
        <a href="/" class="btn btn-link text-dark text-decoration-none small">← Continue Shopping</a>
    </div>
</nav>

<div class="container cart-container">
    <div class="row">
        <div class="col-lg-8">
            <h1 class="fw-bold mb-4">Review your bag.</h1>

            <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5">
                <h4 class="text-muted">Your bag is empty.</h4>
                <a href="/" class="btn btn-primary mt-3 rounded-pill">Shop Now</a>
            </div>

            <div th:each="item : ${cartItems}" class="cart-card shadow-sm">
                <img th:src="${item[3]}" class="product-img me-4" alt="Product">

                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h5 class="fw-bold mb-0" th:text="${item[0]}">Product Name</h5>
                            <p class="text-muted small mb-0" th:text="${item[1]}">Brand</p>
                        </div>
                        <p class="fw-bold" th:text="'₹' + ${item[2]}">₹0</p>
                    </div>

                    <div class="d-flex justify-content-end align-items-center mt-3">
                        <a th:href="@{'/remove-from-cart/' + ${item[4]}}" class="remove-btn">
                            <i class="bi bi-trash"></i> Remove
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4" th:if="${!#lists.isEmpty(cartItems)}">
            <div class="summary-card">
                <h4 class="fw-bold mb-4">Summary</h4>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Subtotal</span>
                    <span th:text="'₹' + ${totalPrice}">₹0</span>
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <span class="text-muted">Shipping</span>
                    <span class="text-success fw-bold">FREE</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-4">
                    <span class="fw-bold fs-5">Total</span>
                    <span class="fw-bold fs-5" th:text="'₹' + ${totalPrice}">₹0</span>
                </div>
                <a href="/checkout" class="btn-checkout">Check Out</a>
                <p class="small text-muted text-center mt-3">Need help? Chat with us</p>
            </div>
        </div>
    </div>
</div>

<footer class="py-5 text-center text-muted mt-5 small">
    <p>© 2026 Premium Mobile Store | Crafted for Abdul Basit</p>
</footer>

</body>
</html>
