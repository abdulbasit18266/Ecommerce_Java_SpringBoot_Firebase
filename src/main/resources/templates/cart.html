<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cart - Mobile Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .product-img { max-height: 80px; object-fit: contain; }
        .qty-box { min-width: 40px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-5 pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Your Shopping Cart</h2>
        <a href="/" class="btn btn-outline-dark rounded-pill px-4">Continue Shopping</a>
    </div>

    <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5 bg-white rounded-4 shadow-sm">
        <i class="bi bi-cart-x text-muted" style="font-size: 4rem;"></i>
        <h5 class="mt-3 text-muted">Your cart is empty</h5>
        <a href="/" class="btn btn-primary mt-3 px-4 rounded-pill">Shop Now</a>
    </div>

    <div th:each="item : ${cartItems}" class="card p-3 mb-3 shadow-sm">
        <div class="row align-items-center">
            <div class="col-md-2 col-3 text-center">
                <img th:src="${item[4]}" class="img-fluid rounded product-img" alt="Mobile">
            </div>

            <div class="col-md-4 col-9">
                <h5 class="fw-bold mb-0" th:text="${item[1]}">Product Name</h5>
                <small class="text-muted" th:text="${item[2]}">Brand</small>
            </div>

            <div class="col-md-3 col-6 d-flex align-items-center justify-content-md-center mt-3 mt-md-0">
                <a th:href="@{'/cart/update/' + ${item[0]} + '/-1'}" class="btn btn-sm btn-light border rounded-circle shadow-sm">
                    <i class="bi bi-dash"></i>
                </a>
                <span class="qty-box mx-3" th:text="${item[5]}">1</span>
                <a th:href="@{'/cart/update/' + ${item[0]} + '/1'}" class="btn btn-sm btn-light border rounded-circle shadow-sm">
                    <i class="bi bi-plus"></i>
                </a>
            </div>

            <div class="col-md-3 col-6 text-end">
                <h5 class="text-primary fw-bold mb-1" th:text="'₹' + (${item[3]} * ${item[5]})"></h5>
                <a th:href="@{'/remove-from-cart/' + ${item[0]}}" class="btn btn-link text-danger text-decoration-none p-0 small">
                    <i class="bi bi-trash"></i> Remove
                </a>
            </div>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(cartItems)}" class="card p-4 mt-4 shadow-sm border-top border-primary border-5">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <span class="text-muted small text-uppercase">Grand Total:</span>
                <h2 class="fw-bold text-dark mb-0">₹ <span th:text="${totalPrice}">0.0</span></h2>
            </div>
            <a href="/checkout" class="btn btn-success btn-lg px-5 rounded-pill shadow-sm fw-bold">
                Proceed to Checkout <i class="bi bi-arrow-right ms-2"></i>
            </a>
        </div>
    </div>
</div>

</body>
</html>
