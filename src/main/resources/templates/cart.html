<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Your Cart - Mobile Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Consistent Global Theme */
        body {
            background: linear-gradient(135deg, #E5E5DE 0%, #F5F5F0 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1A1A1A;
            min-height: 100vh;
        }

        .container { padding-top: 60px; padding-bottom: 80px; }

        /* Typography */
        .cart-title { font-weight: 800; font-size: 2.5rem; letter-spacing: -1.5px; margin-bottom: 10px; }

        /* Premium Item Cards */
        .cart-item-card {
            background: #ffffff;
            border-radius: 30px;
            border: 1px solid rgba(0,0,0,0.03);
            padding: 25px;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        .cart-item-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.07); }

        .product-img { max-height: 100px; object-fit: contain; }

        /* Quantity Controls */
        .qty-box {
            background: #F5F5F0;
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 700;
            min-width: 50px;
            text-align: center;
        }
        .btn-qty {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: #ffffff;
            border: 1px solid #EAEAEA;
            color: #1A1A1A;
            transition: 0.2s;
        }
        .btn-qty:hover { background: #1A1A1A; color: #ffffff; }

        /* Summary Card */
        .summary-card {
            background: #1A1A1A;
            color: #ffffff;
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: none;
        }

        /* Empty State */
        .empty-cart-card {
            background: #ffffff;
            border-radius: 40px;
            padding: 80px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        /* Buttons */
        .btn-premium-dark { background: #1A1A1A; color: #fff; border-radius: 15px; padding: 12px 25px; font-weight: 600; border: none; transition: 0.3s; }
        .btn-premium-dark:hover { background: #333; transform: scale(1.03); color: white; }

        .btn-premium-outline {
            border: 1.5px solid #1A1A1A;
            color: #1A1A1A;
            border-radius: 15px;
            padding: 12px 25px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-premium-outline:hover { background: #1A1A1A; color: #fff; }

        .btn-checkout {
            background: #ffffff;
            color: #1A1A1A;
            border: none;
            border-radius: 18px;
            padding: 18px 40px;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-checkout:hover { background: #A89880; color: #ffffff; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-end mb-5">
        <div>
            <h2 class="cart-title">Your Collection.</h2>
            <p class="text-muted mb-0">Review your handpicked selections before checkout.</p>
        </div>
        <a href="/" class="btn-premium-outline">
            <i class="bi bi-arrow-left me-2"></i>Continue Shopping
        </a>
    </div>

    <div th:if="${#lists.isEmpty(cartItems)}" class="empty-cart-card">
        <div class="mb-4">
            <i class="bi bi-bag-x text-muted" style="font-size: 5rem; opacity: 0.3;"></i>
        </div>
        <h3 class="fw-bold mb-3">Your cart is feeling light.</h3>
        <p class="text-muted mb-4">Discover the latest in refined technology today.</p>
        <a href="/" class="btn-premium-dark px-5 py-3">Explore Collection</a>
    </div>

    <div th:each="item : ${cartItems}" class="cart-item-card mb-4">
        <div class="row align-items-center">
            <div class="col-md-2 col-4 text-center">
                <img th:src="${item[4]}" class="img-fluid product-img" alt="Device">
            </div>

            <div class="col-md-4 col-8">
                <span class="text-uppercase small fw-bold text-muted" style="letter-spacing: 2px;" th:text="${item[2]}">Brand</span>
                <h4 class="fw-bold mt-1 mb-0" th:text="${item[1]}">Product Name</h4>
            </div>

            <div class="col-md-3 col-6 d-flex align-items-center justify-content-md-center mt-4 mt-md-0">
                <a th:href="@{'/cart/update/' + ${item[0]} + '/-1'}" class="btn-qty text-decoration-none">
                    <i class="bi bi-dash-lg"></i>
                </a>
                <span class="qty-box mx-3" th:text="${item[5]}">1</span>
                <a th:href="@{'/cart/update/' + ${item[0]} + '/1'}" class="btn-qty text-decoration-none">
                    <i class="bi bi-plus-lg"></i>
                </a>
            </div>

            <div class="col-md-3 col-6 text-end">
                <h4 class="fw-bold mb-1" th:text="'₹' + (${item[3]} * ${item[5]})"></h4>
                <a th:href="@{'/remove-from-cart/' + ${item[0]}}" class="text-danger text-decoration-none small fw-bold">
                    <i class="bi bi-trash3 me-1"></i> Remove
                </a>
            </div>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(cartItems)}" class="summary-card mt-5">
        <div class="row align-items-center">
            <div class="col-md-6 mb-4 mb-md-0">
                <span class="text-uppercase small fw-bold" style="letter-spacing: 2px; opacity: 0.7;">Total Investment:</span>
                <h1 class="display-5 fw-bold mb-0 mt-2">₹ <span th:text="${totalPrice}">0.0</span></h1>
            </div>
            <div class="col-md-6 text-md-end">
                <a href="/checkout" class="btn btn-checkout btn-lg shadow-lg">
                    Proceed to Checkout <i class="bi bi-arrow-right-short ms-2"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
