<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Mobile Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Home Page wala Gradient aur Font */
        body {
            background: linear-gradient(135deg, #E5E5DE 0%, #F5F5F0 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            color: #1A1A1A;
        }

        /* Premium Login Card */
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 45px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.07);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .brand-logo {
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
            margin-bottom: 30px;
            display: block;
            text-align: center;
            color: #1A1A1A;
            text-decoration: none;
        }

        .login-title {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        /* Form Styling */
        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #A89880; /* Muted Gold/Tan */
            margin-bottom: 10px;
        }

        .form-control-premium {
            background: #F9F9F7 !important;
            border: 1px solid #EAEAEA !important;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-control-premium:focus {
            box-shadow: 0 0 0 4px rgba(168, 152, 128, 0.1);
            border-color: #A89880 !important;
            outline: none;
        }

        /* Buttons */
        .btn-premium-dark {
            background: #1A1A1A;
            color: #fff;
            border-radius: 15px;
            padding: 15px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-premium-dark:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Alert Styling */
        .alert-premium {
            background: #FFF5F5;
            border: 1px solid #FFE0E0;
            color: #D64545;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .link-premium {
            color: #1A1A1A;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .link-premium:hover {
            color: #A89880;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-container">
        <a href="/" class="brand-logo">
            <i class="bi bi-phone-vibrate me-2"></i>MOBILE STORE
        </a>

        <h2 class="login-title text-center">Welcome Back.</h2>
        <p class="text-muted text-center mb-4 small">Please enter your details to login.</p>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control form-control-premium" placeholder="name@example.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control form-control-premium" placeholder="Enter Your Password" required>
            </div>

            <button type="submit" class="btn btn-premium-dark w-100">Login to Account</button>
        </form>

        <div th:if="${error}" class="alert alert-premium mt-4 text-center">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <div class="text-center mt-4">
            <p class="small text-muted">Don't have an account?
                <a href="/register" class="link-premium">Register here</a>
            </p>

            <div th:if="${showForgot}" class="mt-3 p-3 rounded-4" style="background: #FDFDFD; border: 1px dashed #EAEAEA;">
                <p class="text-muted small mb-1">Trouble signing in?</p>
                <a href="/forgot-password" class="text-danger fw-bold small text-decoration-none">Reset Password</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
