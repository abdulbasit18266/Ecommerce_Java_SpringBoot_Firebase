<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout - Mobile Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Inter', sans-serif; }
        .card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .form-control { border-radius: 8px; padding: 10px; border: 1px solid #dee2e6; }
        .btn-confirm { background: #28a745; color: white; border: none; border-radius: 10px; padding: 14px; transition: 0.3s; }
        .btn-confirm:hover { background: #218838; transform: translateY(-2px); color: white; }
        .summary-item { border-bottom: 1px dashed #eee; padding-bottom: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row">
        <div class="col-md-7">
            <div class="card p-4">
                <h3 class="mb-4 fw-bold">Shipping Details</h3>
                <form th:action="@{/place-order}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" name="fullName" class="form-control" placeholder="Abdul Basit" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Delivery Address</label>
                        <textarea name="address" class="form-control" rows="3" placeholder="Flat No, Street, Landmark" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">City</label>
                            <input type="text" name="city" class="form-control" placeholder="Mumbai" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="text" name="phone" class="form-control" placeholder="10-digit number" required pattern="[0-9]{10}">
                        </div>
                    </div>
                    <div class="mt-4">
                        <p class="text-muted small mb-3">Payment Method: <strong>Cash on Delivery (COD)</strong></p>
                        <button type="submit" class="btn btn-confirm w-100 fs-5 fw-bold">Confirm Order</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card p-4 bg-white sticky-top" style="top: 20px;">
                <h4 class="fw-bold mb-4">Order Summary</h4>
                <div th:each="item : ${cartItems}" class="summary-item d-flex justify-content-between align-items-center">
                    <div style="max-width: 70%;">
                        <span class="fw-bold d-block" th:text="${item[0]}">Product Name</span>
                        <small class="text-muted" th:text="${item[1]}">Brand</small>
                    </div>
                    <span class="fw-semibold text-dark" th:text="'₹' + ${item[2]}"></span>
                </div>
                <div class="mt-4">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Subtotal</span>
                        <span class="fw-semibold" th:text="'₹' + ${total}"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Shipping</span>
                        <span class="text-success fw-bold">FREE</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold">Total Amount</h5>
                        <h4 class="text-success fw-bold" th:text="'₹' + ${total}"></h4>
                    </div>
                </div>
                <a href="/cart" class="btn btn-link text-decoration-none w-100 mt-4 text-secondary small">← Edit Bag</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
