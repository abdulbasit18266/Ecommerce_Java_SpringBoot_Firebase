<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row">

        <div class="col-md-6">
            <h3>Shipping Details</h3>

            <form th:action="@{/place-order}" method="post">
                <input type="text" name="fullName" class="form-control mb-3" placeholder="Full Name" required>
                <textarea name="address" class="form-control mb-3" placeholder="Address" required></textarea>
                <input type="text" name="city" class="form-control mb-3" placeholder="City" required>
                <input type="text" name="phone" class="form-control mb-3" placeholder="Phone" required>

                <button class="btn btn-success w-100">Place Order</button>
            </form>
        </div>

        <div class="col-md-6">
            <h3>Summary</h3>
            <div th:each="item : ${cartItems}" class="d-flex justify-content-between mb-2">
                <p>
                    <span th:text="${item[1]}"></span>
                    (x<span th:text="${item[5]}"></span>)
                </p>
                <p class="fw-bold text-primary" th:text="'₹' + (${item[3]} * ${item[5]})"></p>
            </div>
            <hr>
            <h4 class="fw-bold">Total: ₹ <span th:text="${totalPrice}"></span></h4>
        </div>
    </div>
</div>
</body>
</html>
